<div class="container">
  <div *ngIf="loading()">Carregando...</div>
  <div *ngIf="error()">{{ error() }}</div>

  <div *ngIf="workshop()">
    <h1>{{ workshop()!.nome }}</h1>
    <p>{{ workshop()!.descricao }}</p>
    <p>{{ workshop()!.dataRealizacao | date:'dd/MM/yyyy' }}</p>

    <h2>Colaboradores presentes</h2>
    <ul>
      <li *ngFor="let colaborador of workshop()!.colaboradores">
        {{ colaborador.nome }}
      </li>
    </ul>
  </div>
</div>
