<div class="container" style="max-width: 520px;">
  <div class="mb-4">
    <a routerLink="/workshops"
      style="color: #64748b; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.3rem;">
      <i class="bi bi-arrow-left"></i> Voltar para lista
    </a>
  </div>

  <h1 class="page-title mb-1">
    {{ isEditing() ? 'Editar Workshop' : 'Novo Workshop' }}
  </h1>
  <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">
    {{ isEditing() ? 'Atualize os dados do workshop' : 'Preencha os dados para cadastrar' }}
  </p>

  <div *ngIf="error()" class="alert alert-danger mb-3">
    <i class="bi bi-exclamation-circle me-2"></i>{{ error() }}
  </div>

  <div class="card">
    <div class="card-body p-4">
      <div class="mb-3">
        <label class="form-label" style="font-weight: 600; font-size: 0.875rem;">Nome</label>
        <input [(ngModel)]="nome" [ngModelOptions]="{standalone: true}"
          class="form-control" placeholder="Ex: Clean Architecture na prática" />
      </div>

      <div class="mb-3">
        <label class="form-label" style="font-weight: 600; font-size: 0.875rem;">Descrição</label>
        <textarea [(ngModel)]="descricao" [ngModelOptions]="{standalone: true}"
          class="form-control" rows="3"
          placeholder="Descreva o workshop..."></textarea>
      </div>

      <div class="mb-4">
        <label class="form-label" style="font-weight: 600; font-size: 0.875rem;">Data de Realização</label>
        <input type="date" [(ngModel)]="dataRealizacao" [ngModelOptions]="{standalone: true}"
          class="form-control"
          placeholder="Selecione a data"/>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button (click)="save()" class="btn btn-primary">
          <i class="bi bi-check-lg"></i>
          {{ isEditing() ? 'Salvar alterações' : 'Criar workshop' }}
        </button>
        <button *ngIf="isEditing()" (click)="delete()" class="btn btn-danger">
          <i class="bi bi-trash3"></i> Deletar
        </button>
        <a routerLink="/workshops" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </div>
  </div>
</div>
