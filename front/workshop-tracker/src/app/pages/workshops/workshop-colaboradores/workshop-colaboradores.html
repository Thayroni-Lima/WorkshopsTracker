<div class="container">
  <h1>Colaboradores do Workshop</h1>

  <div *ngIf="loading()">Carregando...</div>
  <div *ngIf="error()">{{ error() }}</div>

  <div *ngIf="!loading()">

    <h2>Associados</h2>
    <ul>
      <li *ngFor="let colaborador of colaboradores()">
        {{ colaborador.nome }}
        <button (click)="remover(colaborador.id)">🗑</button>
      </li>
    </ul>
    <p *ngIf="colaboradores().length === 0">Nenhum colaborador associado.</p>

    <h2>Disponíveis para adicionar</h2>
    <ul>
      <li *ngFor="let colaborador of disponiveis()">
        {{ colaborador.nome }}
        <button (click)="adicionar(colaborador.id)">+ Adicionar</button>
      </li>
    </ul>
    <p *ngIf="disponiveis().length === 0">Todos os colaboradores já estão associados.</p>

  </div>

  <a routerLink="/workshops">← Voltar</a>
</div>
