<div class="container">
  <h1>Workshops do Colaborador</h1>

  <div *ngIf="loading()">Carregando...</div>
  <div *ngIf="error()">{{ error() }}</div>

  <ul *ngIf="!loading() && !error()">
    <li *ngFor="let workshop of workshops()">
      <a [routerLink]="['/workshops', workshop.id]">
        {{ workshop.nome }}
      </a>
    </li>
  </ul>

  <a routerLink="/colaboradores">← Voltar</a>
</div>
