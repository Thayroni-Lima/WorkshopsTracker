<div class="container">
  <h1>{{ isEditing() ? 'Editar Colaborador' : 'Novo Colaborador' }}</h1>

  <div *ngIf="error()">{{ error() }}</div>

  <div>
    <label>Nome</label>
    <input [(ngModel)]="nome" [ngModelOptions]="{standalone: true}" placeholder="Nome do colaborador" />
  </div>

  <button (click)="save()">
    {{ isEditing() ? 'Salvar' : 'Criar' }}
  </button>

  <button *ngIf="isEditing()" (click)="delete()">
    Deletar
  </button>

  <a routerLink="/colaboradores">Cancelar</a>
</div>
