<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="page-title">Colaboradores</h1>
      <p style="color: #64748b; margin: 0.25rem 0 0; font-size: 0.9rem;">
        Gerencie os colaboradores da equipe
      </p>
    </div>
    <a routerLink="/colaboradores/new" class="btn btn-primary">
      <i class="bi bi-plus-lg"></i> Novo Colaborador
    </a>
  </div>

  <div *ngIf="loading()" class="text-center py-5">
    <div class="spinner-border"></div>
    <p class="mt-2" style="color: #64748b; font-size: 0.9rem;">Carregando...</p>
  </div>

  <div *ngIf="error()" class="alert alert-danger">
    <i class="bi bi-exclamation-circle me-2"></i>{{ error() }}
  </div>

  <div *ngIf="!loading() && !error()">
    <div class="list-group">
      <div *ngFor="let colaborador of colaboradores()"
        class="list-group-item d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
          <div style="width: 38px; height: 38px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem;">
            {{ colaborador.nome.charAt(0).toUpperCase() }}
          </div>
          <span style="font-weight: 500;">{{ colaborador.nome }}</span>
        </div>
        <div class="d-flex gap-2">
          <a [routerLink]="['/colaboradores', colaborador.id, 'workshops']"
            class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-calendar3"></i> Workshops
          </a>
          <a [routerLink]="['/colaboradores', colaborador.id, 'edit']"
            class="btn btn-sm btn-primary">
            <i class="bi bi-pencil"></i> Editar
          </a>
        </div>
      </div>
    </div>

    <p *ngIf="colaboradores().length === 0"
      class="text-center py-5" style="color: #64748b;">
      <i class="bi bi-people" style="font-size: 2rem; display: block; margin-bottom: 0.5rem;"></i>
      Nenhum colaborador cadastrado ainda.
    </p>
  </div>
</div>
