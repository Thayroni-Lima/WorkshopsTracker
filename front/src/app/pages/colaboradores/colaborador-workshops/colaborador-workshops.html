<div class="container">
  <div class="mb-4">
    <a routerLink="/colaboradores"
      style="color: #64748b; text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.3rem;">
      <i class="bi bi-arrow-left"></i> Voltar para colaboradores
    </a>
  </div>

  <h1 class="page-title mb-1">Workshops do Colaborador</h1>
  <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">
    Gerencie as associações deste colaborador
  </p>

  <div *ngIf="loading()" class="text-center py-5">
    <div class="spinner-border"></div>
  </div>

  <div *ngIf="!loading()">
    <div class="card mb-4">
      <div class="card-body p-4">
        <h5 style="font-weight: 600; margin-bottom: 1rem;">
          <i class="bi bi-check-circle-fill me-2" style="color: var(--success);"></i>
          Associados
        </h5>
        <div class="list-group">
          <div *ngFor="let workshop of workshops()"
            class="list-group-item d-flex justify-content-between align-items-center">
            <a [routerLink]="['/workshops', workshop.id]"
              style="text-decoration: none; color: var(--text); font-weight: 500;">
              <i class="bi bi-mortarboard me-2" style="color: var(--primary);"></i>
              {{ workshop.nome }}
            </a>
            <button (click)="remover(workshop.id)" class="btn btn-sm btn-danger">
              Remover
              <i class="bi bi-trash3"></i>
            </button>
          </div>
        </div>
        <p *ngIf="workshops().length === 0" class="text-center py-3" style="color: #64748b; margin: 0;">
          Nenhum workshop associado.
        </p>
      </div>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <h5 style="font-weight: 600; margin-bottom: 1rem;">
          <i class="bi bi-plus-circle-fill me-2" style="color: var(--primary);"></i>
          Disponíveis para adicionar
        </h5>
        <div class="list-group">
          <div *ngFor="let workshop of disponiveis()"
            class="list-group-item d-flex justify-content-between align-items-center">
            <span style="font-weight: 500;">
              <i class="bi bi-mortarboard me-2" style="color: #94a3b8;"></i>
              {{ workshop.nome }}
            </span>
            <button (click)="adicionar(workshop.id)" class="btn btn-sm btn-primary">
              <i class="bi bi-plus-lg"></i> Adicionar
            </button>
          </div>
        </div>
        <p *ngIf="disponiveis().length === 0" class="text-center py-3" style="color: #64748b; margin: 0;">
          Todos os workshops já estão associados.
        </p>
      </div>
    </div>
  </div>
</div>
